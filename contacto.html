<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Carhuamayo</title>
    <link href="[https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap](https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-submit { background: #c89b2c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s; }
        .btn-submit:hover { background: #a67c20; }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <div class="logo"><h2>CARHUAMAYO</h2></div>
            <nav>
                <ul class="menu">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="historia.html">Historia</a></li>
                    <li><a href="festividades.html">Festividades</a></li>
                    <li><a href="educativas.html">Instituciones</a></li>
                    <li><a href="biblioteca.html">Biblioteca</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="section">
        <h2>Ponte en Contacto</h2>
        <div class="contact-container">
            <form>
                <div class="form-group"><label>Nombre</label><input type="text"></div>
                <div class="form-group"><label>Email</label><input type="email"></div>
                <div class="form-group"><label>Mensaje</label><textarea rows="4"></textarea></div>
                <button type="submit" class="btn-submit">ENVIAR</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Síguenos</h3>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Contacto</h3>
                <p><i class="fas fa-phone-alt"></i> +51 987 654 321</p>
                <p><i class="fab fa-whatsapp"></i> WhatsApp</p>
            </div>
            <div class="footer-section">
                <h3>Ubicación</h3>
                <p><i class="fas fa-map-marker-alt"></i> Plaza Principal s/n, Carhuamayo</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Mayk lazaro - Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>
